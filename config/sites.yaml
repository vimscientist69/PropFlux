sites:
  property24:
    name: "Property24"
    base_url: "https://www.property24.com"
    start_urls:
      # Using Cape Town search results as default - change region code (432) as needed
      - "https://www.property24.com/for-sale/cape-town/western-cape/432"
    
    selectors:
      # Listing page selectors - updated to actual site structure
      listing_container: ".p24_tileContainer"
      listing_links: "a::attr(href)"
      # next_page: ".pagination a.next::attr(href)"
      
      # Detail page selectors
      title: ".p24_listingCard h1::text"
      price: ".p24_price::text"
      location: ".p24_listingCard .p24_address::text"
      bedrooms: ".p24_featureDetails[title='Bedrooms'] span::text"
      bathrooms: ".p24_featureDetails[title='Bathrooms'] span::text"
      property_type: ".p24_propertyOverviewRow:contains('Type of Property') .p24_info::text"
      description: ".p24_expandedText::text"
      agent_name: ".p24_agentName::text"
      agent_phone: ".p24_agentPhone::text"
      agency_name: ".p24_agencyLogoName span::text"
      listing_id: ".p24_propertyOverviewRow:contains('Listing Number') .p24_info::text"
      date_posted: ".p24_propertyOverviewRow:contains('Listing Date') .p24_info::text"
      erf_size: ".p24_propertyOverviewRow:contains('Erf Size') .p24_info::text"
      floor_size: ".p24_propertyOverviewRow:contains('Floor Size') .p24_info::text"
      rates_and_taxes: ".p24_propertyOverviewRow:contains('Rates and Taxes') .p24_info::text"
      levies: ".p24_propertyOverviewRow:contains('Levies') .p24_info::text"
      garages: ".p24_propertyOverviewRow:contains('Garage') .p24_info::text"
      parking: ".p24_propertyOverviewRow:contains('Parking') .p24_info::text"
      backup_power: ".p24_propertyOverviewRow:contains('Backup Power') .p24_info::text"
      security: ".p24_propertyOverviewRow:contains('Security') .p24_info::text"
      pets_allowed: ".p24_propertyOverviewRow:contains('Pets Allowed') .p24_info::text"
      
      # Hidden selectors for phone retrieval API
      agent_profile_url: ".p24_agentPhoto a::attr(href)"
      contact_value: ".js_agentDetails::attr(data-value)"
    
    dynamic_selectors:
      agent_phone:
        show_btn: "a.p24_contactEmailsLink"
        result: "span.p24_sidebarAgentContactNumber"
    
    pagination:
      type: "pattern"
      url_template: "{base_url}/p{page}"
      total_pages_selector: ".pagination li:last-child a::attr(data-pagenumber)"
      max_pages: 30
    
    rate_limit:
      requests_per_minute: 35

  privateproperty:
    name: "Private Property"
    base_url: "https://www.privateproperty.co.za"
    start_urls:
      - "https://www.privateproperty.co.za/for-sale/south-africa/1"
    
    selectors:
      # Listing page selectors
      listing_container: ".featured-listing, .listing-result"
      listing_links: "a::attr(href)"
      next_page: ".pagination .next::attr(href)"
      
      # Detail page selectors
      title: ".listing-details__title::text"
      price: ".listing-price-display__price::text"
      location: ".listing-details__address::text"
      bedrooms: "[title='Bedrooms']::text"
      bathrooms: "[title='Bathrooms']::text"
      property_type: "li:contains('Property type') .property-details__value::text"
      description: ".listing-description__text::text"
      listing_id: "li:contains('Listing number') .property-details__value::text"
      date_posted: "li:contains('Listing date') .property-details__value::text"
      erf_size: "[title='Land size']::text"
      rates_and_taxes: "li:contains('Rates and taxes') .property-details__value::text"
      levies: "li:contains('Levies') .property-details__value::text"
      garages: "[title='Parking spaces']::text"
    
    dynamic_selectors:
      agent_name: "img[alt^='Photo of']::attr(alt)"
      agency_name: "a[href*='/estate-agency']::attr(title)"
    
    pagination:
      type: "pattern"
      url_template: "{base_url}?page={page}"
      total_pages_selector: ".pagination a:nth-last-child(2)::text"
      max_pages: 30
    
    rate_limit:
      requests_per_minute: 35